          \    # Initialize our default output variables\n    is_valid_format = False\n\
          \    target_year_month = \"\"\n    error_message = \"\"\n    \n    # Check\
          \ 1: Is it an allowed file extension?\n    if file_extension not in [\"\
          .xlsx\", \".csv\"]:\n        error_message = f\"Error: Invalid file extension\
          \ '{file_extension}'. Only .xlsx or .csv are allowed.\"\n        return\
          \ {\n            \"is_valid_format\": is_valid_format,\n            \"target_year_month\"\
          : target_year_month,\n            \"error_message\": error_message\n   \
          \     }\n        \n    # Check 2: Does the name exactly match YYYYMM_DXSuite利用実績.xlsx\
          \ / .csv?\n    # This Regex looks for exactly 4 digits, then 2 digits, then\
          \ the exact Japanese string.\n    pattern = r\"^(\\d{4})(\\d{2})_DXSuite利用実績(\\\
          .xlsx|\\.csv)$\"\n    match = re.match(pattern, file_name)\n    \n    if\
          \ not match:\n        error_message = f\"Error: File name '{file_name}'\
          \ does not match the standard format 'YYYYMM_DXSuite利用実績.xlsx'.\"\n    \
          \    return {\n            \"is_valid_format\": is_valid_format,\n     \
          \       \"target_year_month\": target_year_month,\n            \"error_message\"\
          : error_message\n        }\n        \n    # Extract the Year and Month from\
          \ the matched Regex\n    year = match.group(1)\n    month = match.group(2)\n\
          \    \n    # Check 3: Is the month valid? (01 to 12)\n    if int(month)\
          \ < 1 or int(month) > 12:\n        error_message = f\"Error: Invalid month\
          \ '{month}' in file name. Month must be between 01 and 12.\"\n        return\
          \ {\n            \"is_valid_format\": is_valid_format,\n            \"target_year_month\"\
          : target_year_month,\n            \"error_message\": error_message\n   \
          \     }\n        \n    # If all checks pass!\n    is_valid_format = True\n\
          \    target_year_month = f\"{year}-{month}\"\n    \n    return {\n     \
          \   \"is_valid_format\": is_valid_format,\n        \"target_year_month\"\
          : target_year_month,\n        \"error_message\": error_message\n    }"
