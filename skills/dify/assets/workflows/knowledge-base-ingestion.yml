    - data:
        code: "import requests\n\ndef main(extracted_year_month: str, dataset_id:\
          \ str, api_key: str):\n    # 1. Calculate the Financial Year Document Name\n\
          \    parts = extracted_year_month.split(\"-\")\n    if len(parts) == 2:\n\
          \        year = int(parts[0])\n        month = int(parts[1])\n        if\
          \ month >= 4:\n            target_document_name = f\"FY{year}-{year + 1}\"\
          \n        else:\n            target_document_name = f\"FY{year - 1}-{year}\"\
          \n    else:\n        target_document_name = \"FY_Unknown\"\n\n    # 2. Initialize\
          \ default outputs\n    exists = False\n    doc_id = \"\"\n    error_message\
          \ = \"\"\n\n    # 3. Call the Dify Knowledge Base API\n    url = f\"https://<your-dify-domain>/v1/datasets/{dataset_id}/documents\"\
          \n    headers = {\n        \"Authorization\": f\"Bearer {api_key}\"\n  \
          \  }\n    # We pull up to 100 documents to search through\n    params =\
          \ {\n        \"limit\": 100 \n    }\n\n    try:\n        response = requests.get(url,\
          \ headers=headers, params=params)\n        \n        # 4. Check the response\
          \ and find the document\n        if response.status_code == 200:\n     \
          \       data = response.json()\n            documents = data.get(\"data\"\
          , [])\n            \n            # Loop through documents to see if our\
          \ FY document exists\n            for doc in documents:\n              \
          \  if doc.get(\"name\") == target_document_name:\n                    exists\
          \ = True\n                    doc_id = doc.get(\"id\")\n               \
          \     break\n        else:\n            error_message = f\"API Error: {response.status_code}\
          \ - {response.text}\"\n            \n    except Exception as e:\n      \
          \  error_message = str(e)\n\n    return {\n        \"exists\": exists,\n\
          \        \"exisitng_doc_id\": doc_id,\n        \"target_document_name\"\
          : target_document_name,\n        \"error_message\": error_message\n    }"
        code_language: python3
        outputs:
          error_message:
            children: null
            type: string
          exisitng_doc_id:
            children: null
            type: string
          exists:
            children: null
            type: boolean
          target_document_name:
            children: null
            type: string
