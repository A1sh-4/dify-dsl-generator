    - data:
        code: "import json\n\ndef main(company_data: list, target_year_month: str,\
          \ doc_name: str):\n    blocks = []\n    \n    # 1. Compile the text blocks\
          \ without trailing separators\n    for company in company_data:\n      \
          \  name = company.get(\"EU名\", \"Unknown\").strip()\n        plan = company.get(\"\
          プラン\", \"Unknown\")\n        \n        usage_line = (\n            f\"{target_year_month}-{plan}:\
          \ \"\n            f\"{company.get('総リクエスト', '0')}, \"\n            f\"{company.get('文字あり',\
          \ '0')}, \"\n            f\"{company.get('空欄', '0')}, \"\n            f\"\
          {company.get('CBあり', '0')}, \"\n            f\"{company.get('CBなし', '0')},\
          \ \"\n            f\"{company.get('エントリー', '0')}, \"\n            f\"{company.get('ElasticSorter',\
          \ '0')}, \"\n            f\"{company.get('全文読取', '0')}\"\n        )\n  \
          \      \n        # Add just the raw text block for this company\n      \
          \  blocks.append(f\"Company: {name}\\n{usage_line}\")\n\n    # Join all\
          \ blocks with the separator. \n    # This guarantees NO trailing '###\\\
          n' at the end of the document!\n    compiled_text = \"\\n###\\n\".join(blocks)\n\
          \n    # 2. Build the STRICT API Payload\n    payload = {\n        \"name\"\
          : doc_name,\n        \"text\": compiled_text.strip(),\n        \"indexing_technique\"\
          : \"high_quality\",\n        \"doc_form\": \"hierarchical_model\",\n   \
          \     \"doc_language\": \"Japanese\",\n        \"process_rule\": {\n   \
          \         \"mode\": \"hierarchical\",\n            \"rules\": {\n      \
          \          \"pre_processing_rules\": [\n                    {\"id\": \"\
          remove_extra_spaces\", \"enabled\": True},\n                    {\"id\"\
          : \"remove_urls_emails\", \"enabled\": False},\n                    {\"\
          id\": \"remove_stopwords\", \"enabled\": False}\n                ],\n  \
          \              \"parent_mode\": \"paragraph\",\n                \"segmentation\"\
          : {\n                    \"separator\": \"###\\n\",\n                  \
          \  \"max_tokens\": 4000,\n                    \"chunk_overlap\": 0\n   \
          \             },\n                \"subchunk_segmentation\": {\n       \
          \             \"separator\": \"\\n\",\n                    \"max_tokens\"\
          : 500,\n                    \"chunk_overlap\": 0\n                }\n  \
          \          }\n        },\n        \"retrieval_model\": {\n            \"\
          search_method\": \"hybrid_search\",\n            \"reranking_enable\": False,\n\
          \            \"top_k\": 3,\n            \"score_threshold_enabled\": False,\n\
          \            \"weights\": {\n                \"weight_type\": \"keyword_first\"\
          \ \n            }\n        },\n        \"embedding_model\": \"Titan-Embedding-G1\"\
          ,\n        \"embedding_model_provider\": \"openai_api_compatible\"\n   \
          \ }\n\n    # 3. Convert the Object into a JSON String\n    payload_string\
          \ = json.dumps(payload, ensure_ascii=False)\n\n    return {\n        \"\
          api_payload\": payload_string,\n        \"text_length\": len(compiled_text)\n\
          \    }"
        code_language: python3
