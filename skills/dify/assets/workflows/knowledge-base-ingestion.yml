    - data:
        code: "import re\n\ndef main(target_year_month: str, text: str):\n    # 1.\
          \ Date Extraction and Fallback Logic\n    # Look for patterns like \"2025年4月\"\
          \ (2025 Year 4 Month)\n    date_match = re.search(r\"(\\d{4})年(\\d{1,2})月\"\
          , text)\n    if date_match:\n        year = date_match.group(1)\n      \
          \  month = date_match.group(2).zfill(2) # Formats \"4\" to \"04\"\n    \
          \    final_year_month = f\"{year}-{month}\"\n    else:\n        final_year_month\
          \ = target_year_month\n        \n    # 2. Dynamic Column Detection (Header\
          \ Mapping)\n    lines = text.strip().split('\\n')\n    \n    # These are\
          \ the exact Japanese column headers we need to find\n    target_keys = [\n\
          \        \"EU名\", \"プラン\", \"総リクエスト\", \"文字あり\", \n        \"空欄\", \"CBあり\"\
          , \"CBなし\", \"エントリー\", \n        \"ElasticSorter\", \"全文読取\"\n    ]\n  \
          \  \n    col_map = {}\n    data_rows = []\n    \n    for line in lines:\n\
          \        line = line.strip()\n        if not line.startswith('|'):\n   \
          \         continue\n            \n        # Split the markdown row into\
          \ cells and remove whitespace\n        cells = [cell.strip() for cell in\
          \ line.split('|')][1:-1]\n        \n        # Skip the markdown separator\
          \ line (e.g., | --- |)\n        if len(cells) > 0 and cells[0].startswith('---'):\n\
          \            continue\n            \n        # Scan the cells to dynamically\
          \ map which keyword is in which column index\n        for i, cell in enumerate(cells):\n\
          \            for key in target_keys:\n                if key in cell and\
          \ key not in col_map:\n                    col_map[key] = i\n          \
          \          \n        # 3. Data Row Extraction\n        # Only start processing\
          \ rows once we have found the indices for Company Name and Plan\n      \
          \  if \"EU名\" in col_map and \"プラン\" in col_map:\n            eu_idx = col_map[\"\
          EU名\"]\n            \n            # Prevent list out-of-bounds errors\n\
          \            if eu_idx < len(cells):\n                eu_val = cells[eu_idx]\n\
          \                \n                # Exclude the header row itself, empty\
          \ rows, or \"nan\" rows\n                if eu_val and eu_val != \"EU名\"\
          \ and eu_val.lower() != \"nan\":\n                    row_data = {}\n  \
          \                  \n                    for key in target_keys:\n     \
          \                   idx = col_map.get(key)\n                        if idx\
          \ is not None and idx < len(cells):\n                            val = cells[idx]\n\
          \                            # Convert \"nan\" or empty numerical cells\
          \ to \"0\"\n                            if val.lower() == 'nan' or val ==\
          \ '':\n                                val = '0'\n                     \
          \       row_data[key] = val\n                        else:\n           \
          \                 row_data[key] = '0'\n                            \n  \
          \                  data_rows.append(row_data)\n                    \n  \
          \  return {\n        \"extracted_year_month\": final_year_month,\n     \
          \   \"company_data\": data_rows\n    }"
        code_language: python3
