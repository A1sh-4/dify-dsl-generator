    - data:
        code: "import requests\n\ndef main(doc_id: str, dataset_id: str, api_key:\
          \ str):\n    url = f\"https://<your-dify-domain>/v1/datasets/{dataset_id}/documents/{doc_id}/segments\"\
          \n    \n    headers = {\n        \"Authorization\": f\"Bearer {api_key}\"\
          ,\n        \"Content-Type\": \"application/json\"\n    }\n    \n    all_segments\
          \ = []\n    success = False\n    error_message = \"\"\n    \n    # 1. Setup\
          \ Pagination Variables\n    page = 1\n    has_more = True\n    \n    try:\n\
          \        # 2. Loop until we fetch every single page\n        while has_more:\n\
          \            params = {\n                \"status\": \"completed\",\n  \
          \              \"limit\": 100, # Safely hit the Dify maximum\n         \
          \       \"page\": page\n            }\n            \n            response\
          \ = requests.get(url, headers=headers, params=params)\n            \n  \
          \          if response.status_code == 200:\n                data = response.json()\n\
          \                \n                # Add the current page's chunks to our\
          \ master list\n                current_page_segments = data.get(\"data\"\
          , [])\n                all_segments.extend(current_page_segments)\n    \
          \            \n                # Check if Dify says there is another page\
          \ waiting\n                has_more = data.get(\"has_more\", False)\n  \
          \              page += 1 \n                success = True\n            else:\n\
          \                error_message = f\"API Error {response.status_code}: {response.text}\"\
          \n                success = False\n                break # Stop the loop\
          \ if we hit an error\n                \n    except Exception as e:\n   \
          \     error_message = str(e)\n        success = False\n        \n    return\
          \ {\n        \"existing_segments\": all_segments,\n        \"count\": len(all_segments),\n\
          \        \"success\": success,\n        \"error_message\": error_message\n\
          \    }"
        code_language: python3
