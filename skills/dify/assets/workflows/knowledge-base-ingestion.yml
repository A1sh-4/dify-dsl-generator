    - data:
        code: "def main(company_data: list, existing_segments: list, target_year_month:\
          \ str):\n    existing_clients_to_update = []\n    new_clients_to_create\
          \ = []\n    \n    # 1. Detailed lookup dictionary\n    segment_lookup =\
          \ {}\n    for segment in existing_segments:\n        content = segment.get(\"\
          content\", \"\")\n        seg_id = segment.get(\"id\")\n        child_chunks\
          \ = segment.get(\"child_chunks\", [])\n        \n        if content.startswith(\"\
          Company: \"):\n            first_line = content.split(\"\\n\")[0] \n   \
          \         company_name_in_dify = first_line.replace(\"Company: \", \"\"\
          ).strip()\n            \n            if company_name_in_dify and seg_id:\n\
          \                # Shield: Check if month already exists\n             \
          \   already_has_month = False\n                for child in child_chunks:\n\
          \                    if child.get(\"content\", \"\").startswith(target_year_month):\n\
          \                        already_has_month = True\n                    \
          \    break\n                \n                segment_lookup[company_name_in_dify]\
          \ = {\n                    \"segment_id\": seg_id,\n                   \
          \ \"parent_content\": content, # <--- WE NOW SAVE THE FULL PARENT TEXT\n\
          \                    \"already_has_month\": already_has_month\n        \
          \        }\n\n    # 2. Route the traffic\n    for company in company_data:\n\
          \        name = company.get(\"EU名\", \"Unknown\").strip()\n        plan\
          \ = company.get(\"プラン\", \"Unknown\")\n        \n        usage_line = (\n\
          \            f\"{target_year_month}-{plan}: \"\n            f\"{company.get('総リクエスト',\
          \ '0')}, \"\n            f\"{company.get('文字あり', '0')}, \"\n           \
          \ f\"{company.get('空欄', '0')}, \"\n            f\"{company.get('CBあり', '0')},\
          \ \"\n            f\"{company.get('CBなし', '0')}, \"\n            f\"{company.get('エントリー',\
          \ '0')}, \"\n            f\"{company.get('ElasticSorter', '0')}, \"\n  \
          \          f\"{company.get('全文読取', '0')}\"\n        )\n        \n      \
          \  # Route 1: Existing Client (Update Parent)\n        if name in segment_lookup:\n\
          \            if not segment_lookup[name][\"already_has_month\"]:\n     \
          \           old_content = segment_lookup[name][\"parent_content\"]\n   \
          \             # Concatenate the old timeline with the new month!\n     \
          \           new_parent_content = f\"{old_content.strip()}\\n{usage_line}\"\
          \n                \n                existing_clients_to_update.append({\n\
          \                    \"company_name\": name,\n                    \"segment_id\"\
          : segment_lookup[name][\"segment_id\"],\n                    \"updated_parent_content\"\
          : new_parent_content # <--- THE NEW GOLDEN VARIABLE\n                })\n\
          \            \n        # Route 2: Brand New Client (Create Parent)\n   \
          \     else:\n            # For new clients, the parent content is just the\
          \ name + the first month\n            new_parent_content = f\"Company: {name}\\\
          n{usage_line}\"\n            new_clients_to_create.append({\n          \
          \      \"company_name\": name,\n                \"updated_parent_content\"\
          : new_parent_content\n            })\n\n    return {\n        \"existing_clients_to_update\"\
          : existing_clients_to_update,\n        \"new_clients_to_create\": new_clients_to_create,\n\
          \        \"update_count\": len(existing_clients_to_update),\n        \"\
          create_count\": len(new_clients_to_create)\n    }"
        code_language: python3
        outputs:
          create_count:
