          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 50
        model:
          completion_params:
            temperature: 0.3
          mode: chat
          name: Claude-4-Sonnet
          provider: langgenius/openai_api_compatible/openai_api_compatible
        prompt_template:
        - id: b83728cb-9839-45ac-a957-8c8da214b54d
          role: system
          text: 'You are a helpful assistant that answers questions strictly based
            on the provided knowledge base context.


            Rules:

            - Answer ONLY based on the context documents provided. Do not use outside
            knowledge.

            - Always cite the source document name or section when referencing information.

            - If the context does not contain enough information to answer, respond
            with: "I don''t have sufficient information in the knowledge base to answer
            that question."

            - Be concise and accurate. Do not add information not found in the context.'
        - id: 9712b40e-66e9-45a2-aac4-d461eebd33f0
          role: user
          text: '{{#context#}}'
